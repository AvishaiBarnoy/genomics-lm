# Stage 3: Multi-Task Protein-Critic
# Trains a single ProteinLM backbone to classify Family, Function, and Stability

# Data
train_data: "data/processed/protein_lm/multitask/train.jsonl"
val_data: "data/processed/protein_lm/multitask/val.jsonl"

# Architecture
block_size: 512
n_layer: 8
n_head: 8
n_embd: 256
dropout: 0.1

# Training
batch_size: 4
epochs: 50
lr: 0.0001
out_dir: "runs/protein_critic/checkpoints"
