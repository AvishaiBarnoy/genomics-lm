model:
  n_layer: 6
  n_head: 4
  n_embd: 256
  block_size: 512
  dropout: 0.1
  num_classes: 2 # e.g., for ENZYME vs NON_ENZYME. Can be updated or detected from data.

training:
  batch_size: 32
  grad_accum_steps: 4
  lr: 1e-4
  weight_decay: 0.01
  epochs: 5

data:
  train_path: data/processed/protein_lm/train_classified.jsonl
  val_path: data/processed/protein_lm/val_classified.jsonl