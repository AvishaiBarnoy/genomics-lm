# Isolate: only GQA (n_kv_head=2), all else same as baseline
vocab_size: 69
block_size: 512
n_layer: 10
n_head: 8
n_embd: 384
n_kv_head: 2              # ← ONLY change from baseline
dropout: 0.1
label_smoothing: 0.05
use_checkpoint: true
use_sdpa: true
sep_mask_enabled: true

itos_path: "data/processed/itos_codon.txt"
train_npz: "data/processed/stage2.6_large_master_pack/train_bs512.npz"
val_npz: "data/processed/stage2.6_large_master_pack/val_bs512.npz"
test_npz: "data/processed/stage2.6_large_master_pack/test_bs512.npz"

batch_size: 4
grad_accum_steps: 32
epochs: 1
lr: 0.00003
min_lr: 0.000003
weight_decay: 0.05
warmup_steps: 100
early_stop_patience: 20

out_dir: "runs/bench_gqa_only/checkpoints"
scores_dir: "runs/bench_gqa_only/scores"
