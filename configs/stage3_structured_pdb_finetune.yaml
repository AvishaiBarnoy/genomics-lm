# Stage 3 — PDB-filtered structural fine-tuning starter.
#
# This config is intentionally conservative: it starts from the best current
# d384 CodonLM and fine-tunes on a curated structure-enriched CDS subset. Build
# the subset first with scripts/filter_cds_by_pdb.py, then tokenize/pack it with
# the existing codon_tokenize.py and build_dataset.py utilities.

vocab_size: 69
block_size: 512
n_layer: 10
n_head: 8
n_kv_head: 4
n_embd: 384
dropout: 0.1
label_smoothing: 0.05
use_checkpoint: true
use_sdpa: true
sep_mask_enabled: true

transfer_from: "runs/2026-06-15_stage2.6_10L8H_d384_e10/checkpoints/best.pt"

itos_path: "data/processed/itos_codon.txt"
train_npz: "data/processed/structured_pdb_pack/train_bs512.npz"
val_npz: "data/processed/structured_pdb_pack/val_bs512.npz"
test_npz: "data/processed/structured_pdb_pack/test_bs512.npz"

batch_size: 8
grad_accum_steps: 16
epochs: 3
lr: 0.00001
min_lr: 0.000001
weight_decay: 0.05
warmup_steps: 50
early_stop_patience: 10
max_time_minutes: 240

use_mmap: true
num_workers: 0
pin_memory: false

out_dir: "runs/stage3_structured_pdb_finetune/checkpoints"
scores_dir: "runs/stage3_structured_pdb_finetune/scores"
